name: Build and Release Plugins

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      plugins:
        description: '指定要构建的插件文件夹名，多个可用逗号、空格或换行分隔'
        required: false
        type: string
        default: ''
      build_all:
        description: '构建所有插件（而不是仅构建变动的插件）'
        required: false
        type: boolean
        default: false

jobs:
  build-pasteboardpro-helper:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect Paste剪切板 helper requirement
        id: helper
        env:
          BUILD_ALL: ${{ github.event.inputs.build_all || 'false' }}
          BUILD_PLUGINS: ${{ github.event.inputs.plugins || '' }}
        run: |
          if [ "${BUILD_ALL}" = "true" ] || [[ "${BUILD_PLUGINS}" == *"pasteboard-pro"* ]] || ! git diff --quiet HEAD~1 HEAD -- plugins/pasteboard-pro; then
            echo "required=true" >> "${GITHUB_OUTPUT}"
          else
            echo "required=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Import Developer ID certificate
        if: steps.helper.outputs.required == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          test -n "${APPLE_CERTIFICATE_P12_BASE64}"
          test -n "${APPLE_CERTIFICATE_PASSWORD}"
          test -n "${APPLE_SIGNING_IDENTITY}"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 24)
          echo "${APPLE_CERTIFICATE_P12_BASE64}" | base64 --decode > signing-certificate.p12
          security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security import signing-certificate.p12 -k build.keychain -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" build.keychain
          security list-keychains -d user -s build.keychain

      - name: Build Vision helper
        if: steps.helper.outputs.required == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          plugins/pasteboard-pro/apps/ztools/native/vision-helper/build.sh
          codesign --force --options runtime --timestamp --sign "${APPLE_SIGNING_IDENTITY}" plugins/pasteboard-pro/apps/ztools/native/vision-helper/dist/pasteboard-vision
          codesign --verify --deep --strict --verbose=2 plugins/pasteboard-pro/apps/ztools/native/vision-helper/dist/pasteboard-vision

      - name: Notarize Vision helper
        if: steps.helper.outputs.required == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "${APPLE_ID}"
          test -n "${APPLE_APP_SPECIFIC_PASSWORD}"
          test -n "${APPLE_TEAM_ID}"
          ditto -c -k --keepParent plugins/pasteboard-pro/apps/ztools/native/vision-helper/dist/pasteboard-vision pasteboard-vision-notarization.zip
          xcrun notarytool submit pasteboard-vision-notarization.zip \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait
          spctl --assess --type execute --verbose=4 plugins/pasteboard-pro/apps/ztools/native/vision-helper/dist/pasteboard-vision
          node plugins/pasteboard-pro/apps/ztools/scripts/attest-vision-helper.mjs \
            plugins/pasteboard-pro/apps/ztools/native/vision-helper/dist/pasteboard-vision \
            --signature=developer-id \
            --require-gatekeeper \
            --output=plugins/pasteboard-pro/apps/ztools/native/vision-helper/dist/pasteboard-vision-attestation.json

      - name: Upload Vision helper
        if: steps.helper.outputs.required == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pasteboardpro-vision-${{ github.sha }}
          path: |
            plugins/pasteboard-pro/apps/ztools/native/vision-helper/dist/pasteboard-vision
            plugins/pasteboard-pro/apps/ztools/native/vision-helper/dist/pasteboard-vision-attestation.json
          if-no-files-found: error
          retention-days: 3

  detect:
    needs: build-pasteboardpro-helper
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      release_version: ${{ steps.detect.outputs.release_version }}
      changed_plugins: ${{ steps.detect.outputs.changed_plugins }}
      has_linux: ${{ steps.split.outputs.has_linux }}
      has_windows: ${{ steps.split.outputs.has_windows }}
      has_macos: ${{ steps.split.outputs.has_macos }}
      linux_plugins: ${{ steps.split.outputs.linux_plugins }}
      windows_plugins: ${{ steps.split.outputs.windows_plugins }}
      macos_plugins: ${{ steps.split.outputs.macos_plugins }}

    steps:
      - name: Wait for previous workflow runs
        timeout-minutes: 360
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          CURRENT_RUN_NUMBER: ${{ github.run_number }}
          WORKFLOW_NAME: ${{ github.workflow }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          echo "Waiting for older ${WORKFLOW_NAME} runs on ${BRANCH_NAME}..."

          while true; do
            older_runs=$(
              gh api --paginate -X GET "/repos/${GITHUB_REPOSITORY}/actions/runs" \
                -f branch="${BRANCH_NAME}" \
                -F per_page=100 |
              jq -r \
                --arg workflow_name "${WORKFLOW_NAME}" \
                --arg branch_name "${BRANCH_NAME}" \
                --argjson current_run_id "${CURRENT_RUN_ID}" \
                --argjson current_run_number "${CURRENT_RUN_NUMBER}" \
                '
                  .workflow_runs[]
                  | select(
                      .name == $workflow_name
                      and .head_branch == $branch_name
                      and .id != $current_run_id
                      and .run_number < $current_run_number
                      and .status != "completed"
                    )
                  | "#\(.run_number) \(.status) \(.html_url)"
                '
            )

            if [ -z "${older_runs}" ]; then
              echo "No older running or queued workflow runs found."
              break
            fi

            echo "Older workflow runs are still active:"
            echo "${older_runs}"
            sleep 30
          done

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect changed plugins
        id: detect
        run: node scripts/detect-changes.js
        env:
          BUILD_ALL: ${{ github.event.inputs.build_all || 'false' }}
          BUILD_PLUGINS: ${{ github.event.inputs.plugins || '' }}

      - name: Split changed plugins by platform
        id: split
        if: steps.detect.outputs.has_changes == 'true'
        run: node scripts/split-build-info-by-platform.js

      - name: Upload build info
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-build-info
          path: |
            release/build-info.json
            release/build-info.linux.json
            release/build-info.windows.json
            release/build-info.macos.json
          if-no-files-found: error

  build-linux:
    needs: detect
    if: needs.detect.outputs.has_linux == 'true'
    uses: ./.github/workflows/build-release-plugin-platform.yml
    with:
      platform_name: linux
      runner: ubuntu-latest

  build-windows:
    needs: detect
    if: needs.detect.outputs.has_windows == 'true'
    uses: ./.github/workflows/build-release-plugin-platform.yml
    with:
      platform_name: windows
      runner: windows-latest

  build-macos:
    needs: detect
    if: needs.detect.outputs.has_macos == 'true'
    uses: ./.github/workflows/build-release-plugin-platform.yml
    with:
      platform_name: macos
      runner: macos-latest

  release:
    needs: [detect, build-linux, build-windows, build-macos]
    if: |
      always() &&
      needs.detect.outputs.has_changes == 'true' &&
      (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: npm install

      - name: Download build info
        uses: actions/download-artifact@v4
        with:
          name: release-build-info
          path: release

      - name: Download built plugin packages
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-plugin-packages
          path: release-artifacts
          merge-multiple: true

      - name: Collect built plugin packages
        run: |
          cp release-artifacts/*.zip release/
          node -e "const fs = require('fs'); const info = JSON.parse(fs.readFileSync('release/build-info.json', 'utf8')); fs.writeFileSync('release/latest', info.releaseVersion, 'utf8')"
          ls -la release

      - name: Download previous release assets
        run: node scripts/download-previous-assets.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate plugins.json
        run: node scripts/generate-plugins-json.js

      - name: Prepare layout.yaml
        run: cp layout.yaml release/layout.yaml

      - name: Prepare release body
        run: |
          echo "## 更新的插件" > release/release-body.md
          echo "" >> release/release-body.md
          if [ -f release/changelog.txt ]; then
            echo "| 插件名称 | 版本 | 描述 |" >> release/release-body.md
            echo "| --- | --- | --- |" >> release/release-body.md
            while IFS= read -r line; do
              plugin_name=$(echo "$line" | sed -E 's/ v[0-9]+\.[0-9]+\.[0-9]+:.*//')
              version=$(echo "$line" | sed -E 's/.*v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
              description=$(echo "$line" | sed -E 's/.*: //')
              echo "| $plugin_name | $version | $description |" >> release/release-body.md
            done < release/changelog.txt
          else
            echo "无变更信息" >> release/release-body.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.detect.outputs.release_version }}
          name: Release v${{ needs.detect.outputs.release_version }}
          body_path: release/release-body.md
          files: |
            release/*.zip
            release/plugins.json
            release/categories.json
            release/layout.yaml
            release/latest
            release/pasteboardpro-archive-verification.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger EdgeOne build hook
        run: |
          if [ -z "${EDGEONE_BUILD_URL}" ]; then
            echo "EDGEONE_BUILD_URL is not set"
            exit 1
          fi

          curl -fsS -X POST "${EDGEONE_BUILD_URL}"
        env:
          EDGEONE_BUILD_URL: ${{ secrets.EDGEONE_BUILD_URL || vars.EDGEONE_BUILD_URL }}
