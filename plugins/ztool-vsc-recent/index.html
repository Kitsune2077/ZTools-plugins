<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div id="toolbar" hidden>
    <button
      id="configure-vscode"
      type="button"
      title="设置 VSCode（选择 Code.exe）"
      aria-label="设置 VSCode"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.62l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.1 7.1 0 0 0-1.62-.94L14.4 2.8a.48.48 0 0 0-.48-.4h-3.84a.48.48 0 0 0-.47.4l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.73 8.86a.48.48 0 0 0 .12.62l2.03 1.58c-.05.31-.08.65-.08.94s.03.63.08.94l-2.03 1.58a.49.49 0 0 0-.12.62l1.92 3.32c.12.22.38.31.59.22l2.39-.96c.49.38 1.03.7 1.62.94l.36 2.54c.04.23.24.4.47.4h3.84c.24 0 .44-.17.47-.4l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.62l-2.01-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z" />
      </svg>
    </button>
  </div>
  <ul id="list"></ul>
  <div id="empty" hidden>没有找到最近的 VSCode 项目。先在 VSCode 中打开一次项目，再回来试试。</div>
  <pre id="diag" hidden></pre>
  <script>
    // 防御性兜底：sandboxed renderer 中没有 exports；让 tsc CommonJS 产物的 marker 行不报错。
    if (typeof exports === 'undefined') { window.exports = {}; }
  </script>
  <script src="index.js"></script>
</body>
</html>
