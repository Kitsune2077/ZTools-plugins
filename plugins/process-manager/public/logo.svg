  <line x1="64" y1="48" x2="56" y2="92" stroke="#FFFFFF" stroke-width="2" opacity="0.4" />

  <!-- Search magnifier -->
  <circle cx="74" cy="74" r="14" fill="none" stroke="#FFFFFF" stroke-width="3" />
  <line x1="84" y1="84" x2="100" y2="100" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
