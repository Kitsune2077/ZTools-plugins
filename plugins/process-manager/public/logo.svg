  <line x1="40" y1="36" x2="34" y2="68" stroke="#FFFFFF" stroke-width="2" opacity="0.4" />
  <line x1="40" y1="36" x2="64" y2="48" stroke="#FFFFFF" stroke-width="2" opacity="0.4" />
  <line x1="80" y1="28" x2="88" y2="64" stroke="#FFFFFF" stroke-width="2" opacity="0.4" />
