<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主渐变：紫色系 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#A29BFE"/>
    </linearGradient>
    <!-- 铁砧金属质感 -->
    <linearGradient id="anvil" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E4F0"/>
      <stop offset="50%" style="stop-color:#C8C0D8"/>
      <stop offset="100%" style="stop-color:#A89CB8"/>
    </linearGradient>
    <!-- 锤子金属 -->
    <linearGradient id="hammer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0ECF5"/>
      <stop offset="100%" style="stop-color:#D0C8E0"/>
    </linearGradient>
    <!-- 文字发光 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 火花发光 -->
    <filter id="spark-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 圆角矩形裁切 -->
    <clipPath id="round">
      <rect x="0" y="0" width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- 背景：圆角矩形 -->
  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- 背景装饰纹理：细微网格 -->
    <g opacity="0.06">
      <line x1="0" y1="64" x2="512" y2="64" stroke="#fff" stroke-width="1"/>
      <line x1="0" y1="128" x2="512" y2="128" stroke="#fff" stroke-width="1"/>
      <line x1="0" y1="192" x2="512" y2="192" stroke="#fff" stroke-width="1"/>
      <line x1="0" y1="256" x2="512" y2="256" stroke="#fff" stroke-width="1"/>
      <line x1="0" y1="320" x2="512" y2="320" stroke="#fff" stroke-width="1"/>
      <line x1="0" y1="384" x2="512" y2="384" stroke="#fff" stroke-width="1"/>
      <line x1="0" y1="448" x2="512" y2="448" stroke="#fff" stroke-width="1"/>
      <line x1="64" y1="0" x2="64" y2="512" stroke="#fff" stroke-width="1"/>
      <line x1="128" y1="0" x2="128" y2="512" stroke="#fff" stroke-width="1"/>
      <line x1="192" y1="0" x2="192" y2="512" stroke="#fff" stroke-width="1"/>
      <line x1="256" y1="0" x2="256" y2="512" stroke="#fff" stroke-width="1"/>
      <line x1="320" y1="0" x2="320" y2="512" stroke="#fff" stroke-width="1"/>
      <line x1="384" y1="0" x2="384" y2="512" stroke="#fff" stroke-width="1"/>
      <line x1="448" y1="0" x2="448" y2="512" stroke="#fff" stroke-width="1"/>
    </g>
  </g>

  <!-- ===== 铁砧 ===== -->
  <!-- 砧面（顶部平面） -->
  <rect x="148" y="260" width="216" height="18" rx="4" ry="4" fill="url(#anvil)" opacity="0.95"/>
  <!-- 砧身 -->
  <path d="M170 278 L155 350 L357 350 L342 278 Z" fill="url(#anvil)" opacity="0.85"/>
  <!-- 砧座 -->
  <rect x="160" y="350" width="192" height="16" rx="4" ry="4" fill="url(#anvil)" opacity="0.75"/>
  <!-- 砧面高光 -->
  <rect x="160" y="260" width="180" height="4" rx="2" ry="2" fill="#fff" opacity="0.3"/>

  <!-- ===== 锤子 ===== -->
  <!-- 锤柄 -->
  <line x1="310" y1="160" x2="360" y2="220" stroke="url(#hammer)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <!-- 锤头 -->
  <rect x="280" y="140" width="50" height="28" rx="5" ry="5" fill="url(#hammer)" opacity="0.9"
        transform="rotate(-35, 305, 154)"/>
  <!-- 锤头高光 -->
  <rect x="285" y="145" width="40" height="6" rx="3" ry="3" fill="#fff" opacity="0.25"
        transform="rotate(-35, 305, 148)"/>

  <!-- ===== 铁砧上的发光文字 ===== -->
  <g filter="url(#glow)">
    <!-- {{ }} 变量符号 -->
    <text x="185" y="305" font-family="monospace" font-size="22" font-weight="700" fill="#FDCB6E" opacity="0.95">{{</text>
    <text x="268" y="305" font-family="monospace" font-size="22" font-weight="700" fill="#FDCB6E" opacity="0.95">}}</text>
    <!-- 中间的"词"字 -->
    <text x="222" y="308" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="700" fill="#fff" opacity="0.95">词</text>
  </g>

  <!-- ===== 火花 ===== -->
  <g filter="url(#spark-glow)">
    <!-- 火花粒子 -->
    <circle cx="195" cy="245" r="3" fill="#FDCB6E" opacity="0.9"/>
    <circle cx="220" cy="230" r="2.5" fill="#FDCB6E" opacity="0.8"/>
    <circle cx="250" cy="225" r="3.5" fill="#FDCB6E" opacity="0.85"/>
    <circle cx="280" cy="232" r="2" fill="#FDCB6E" opacity="0.7"/>
    <circle cx="310" cy="240" r="3" fill="#FDCB6E" opacity="0.8"/>
    <circle cx="330" cy="250" r="2.5" fill="#FDCB6E" opacity="0.75"/>
    <!-- 火花轨迹线 -->
    <line x1="200" y1="255" x2="185" y2="235" stroke="#FDCB6E" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="240" y1="255" x2="225" y2="228" stroke="#FDCB6E" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="290" y1="255" x2="305" y2="235" stroke="#FDCB6E" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- ===== 底部文字：词匠 ===== -->
  <g filter="url(#glow)">
    <text x="256" y="430" text-anchor="middle"
          font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="48" font-weight="800" fill="#fff" opacity="0.95"
          letter-spacing="12">词匠</text>
  </g>
  <!-- 英文副标题 -->
  <text x="256" y="458" text-anchor="middle"
        font-family="'SF Pro Display','Segoe UI',sans-serif"
        font-size="14" font-weight="500" fill="#fff" opacity="0.5"
        letter-spacing="4">PROMPT FORGE</text>
</svg>